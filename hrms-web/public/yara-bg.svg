<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <style>
      .circuit { stroke: #D4AF37; stroke-width: 0.5; fill: none; opacity: 0.3; }
      .logo-stroke { stroke: #D4AF37; stroke-width: 3; fill: none; }
      .text-fill { fill: #D4AF37; }
    </style>
  </defs>
  
  <!-- Circuit pattern background -->
  <g class="circuit">
    <line x1="0" y1="50" x2="100" y2="50"/>
    <line x1="100" y1="50" x2="120" y2="30"/>
    <line x1="100" y1="50" x2="120" y2="70"/>
    <circle cx="100" cy="50" r="2"/>
    
    <line x1="400" y1="80" x2="500" y2="80"/>
    <line x1="380" y1="80" x2="400" y2="60"/>
    <circle cx="400" cy="80" r="2"/>
    
    <line x1="50" y1="400" x2="50" y2="500"/>
    <line x1="50" y1="380" x2="70" y2="400"/>
    <circle cx="50" cy="400" r="2"/>
    
    <line x1="450" y1="400" x2="450" y2="500"/>
    <line x1="450" y1="380" x2="470" y2="400"/>
    <circle cx="450" cy="400" r="2"/>
  </g>
  
  <!-- YARA logo -->
  <g transform="translate(250, 250)">
    <!-- Y symbol with circuit lines -->
    <path class="logo-stroke" d="M -40,-60 L 0,0 L 40,-60 M 0,0 L 0,60"/>
    <path class="logo-stroke" d="M -35,-60 L -5,0 M 5,0 L 35,-60"/>
    <path class="logo-stroke" d="M -30,-60 L -10,0 M 10,0 L 30,-60"/>
  </g>
  
  <!-- YARA text -->
  <text class="text-fill" x="250" y="360" font-family="serif" font-size="32" text-anchor="middle" letter-spacing="8">YARA</text>
</svg>
